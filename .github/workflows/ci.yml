name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-startpaac:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout startpaac repository
        uses: actions/checkout@v4

      - name: Checkout pipelines-as-code repository (required dependency)
        uses: actions/checkout@v4
        with:
          repository: tektoncd/pipelines-as-code
          path: pipelines-as-code

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: "latest"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Set up ko (Build/deploy Go apps on Kubernetes)
        uses: ko-build/setup-ko@v0.9

      - name: Install minica (Self-signed certificate generation)
        run: |
          go install github.com/jsha/minica@v1.1.0
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Verify all dependencies installed
        run: |
          echo "=== Verifying tool installations ==="
          docker --version
          kind version || echo "kind will be installed by kind-action"
          helm version
          kubectl version --client
          ko version
          minica --version || echo "minica installed"
          jq --version

      - name: Set up Kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: kind

      - name: Configure startpaac
        run: |
          mkdir -p $HOME/.config/startpaac
          mkdir -p $HOME/secrets

          # Create dummy secret files for CI testing
          echo "https://smee.io/dummy-ci-webhook" > $HOME/secrets/smee
          echo "dummy-github-app-id" > $HOME/secrets/github-application-id
          echo "dummy-private-key" > $HOME/secrets/github-private-key
          echo "dummy-webhook-secret" > $HOME/secrets/webhook.secret

          cat > $HOME/.config/startpaac/config <<EOF
          TARGET_HOST=local
          PAC_DIR=${{ github.workspace }}/pipelines-as-code
          PAC_SECRET_FOLDER=$HOME/secrets
          EOF
          echo "=== startpaac config ==="
          cat $HOME/.config/startpaac/config

      - name: Run startpaac -a (non-interactive full installation)
        timeout-minutes: 30
        run: |
          set -x
          ./startpaac --ci -a

      - name: Set up kubeconfig for kind cluster
        run: |
          kind export kubeconfig --name kind
          kubectl config use-context kind-kind
          kubectl cluster-info

      - name: Wait for deployments to be ready
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          echo "=== Waiting for Tekton Pipelines ==="
          kubectl -n tekton-pipelines rollout status deployment --timeout=300s

          echo "=== Waiting for Envoy Gateway ==="
          kubectl -n envoy-gateway-system rollout status deployment/envoy-gateway --timeout=300s

          echo "=== Waiting for PAC deployments ==="
          for name in controller webhook watcher; do
            echo "--- pipelines-as-code-$name ---"
            kubectl -n pipelines-as-code rollout status deployment/pipelines-as-code-$name --timeout=120s
          done

          echo "=== Waiting for Forgejo ==="
          kubectl -n forgejo rollout status deployment/forgejo --timeout=300s

      - name: Run smoke tests
        timeout-minutes: 10
        run: |
          set -euxo pipefail

          echo "=== Verify Kind cluster ==="
          kind get clusters | grep -q "kind"

          echo "=== Verify core namespaces ==="
          kubectl get namespace tekton-pipelines
          kubectl get namespace envoy-gateway-system
          kubectl get namespace pipelines-as-code
          kubectl get namespace forgejo

          echo "=== Verify Tekton pods running ==="
          kubectl get pods -n tekton-pipelines -o wide
          kubectl wait --for=condition=Ready pods --all -n tekton-pipelines --timeout=60s

          echo "=== Verify PAC pods running ==="
          kubectl get pods -n pipelines-as-code -o wide
          for name in controller webhook watcher; do
            kubectl rollout status deployment/pipelines-as-code-$name -n pipelines-as-code --timeout=60s
          done

          echo "=== Verify PAC controller endpoint exists ==="
          kubectl get ep -n pipelines-as-code pipelines-as-code-controller

          echo "=== Verify Forgejo running ==="
          kubectl get pods -n forgejo -o wide
          kubectl wait --for=condition=Ready pods --all -n forgejo --timeout=60s

          echo "=== All smoke tests passed ==="

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Kind cluster status ==="
          kind get clusters || true

          echo "=== All pods in all namespaces ==="
          kubectl get pods -A -o wide || true

          echo "=== Events in all namespaces ==="
          kubectl get events -A --sort-by='.lastTimestamp' || true

          echo "=== Logs from failed/pending pods ==="
          kubectl get pods -A -o json | \
            jq -r '.items[] | select(.status.phase != "Running" and .status.phase != "Succeeded") |
            "\(.metadata.namespace) \(.metadata.name)"' | \
            while read ns pod; do
              echo "=== Logs for $ns/$pod ==="
              kubectl logs -n "$ns" "$pod" --all-containers=true --tail=100 || true
            done

      - name: Export Kind logs on failure
        if: failure()
        run: |
          echo "=== Exporting Kind cluster logs ==="
          kind export logs /tmp/kind-logs || true

      - name: Upload Kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: /tmp/kind-logs
          retention-days: 7
